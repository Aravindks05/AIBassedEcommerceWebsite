<!DOCTYPE html>
<html>
<head>
<title>Login – ShopEase</title>
<style>
body{
margin:0;height:100vh;
display:flex;justify-content:center;align-items:center;
font-family:'Segoe UI';
background:linear-gradient(135deg,#667eea,#764ba2);
}
.card{
background:white;padding:40px;border-radius:15px;
width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.2);text-align:center;
}
input{
width:100%;padding:12px;margin:10px 0;
border-radius:8px;border:1px solid #ccc;
box-sizing:border-box;
}
button{
width:100%;padding:12px;background:#667eea;
color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;
}
button:hover{background:#5a6fd6;}
a{display:block;margin-top:10px;color:#667eea;}
.error{background:#ffe0e0;color:#c0392b;padding:10px;border-radius:8px;margin-bottom:10px;font-size:14px;}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
  <input name="username" placeholder="Username" required>
  <input type="password" name="password" placeholder="Password" required>
  <button>Login</button>
</form>
<a href="/register">Create account</a>
</div>
</body>
</html>
